services:
  # ── Databases ──────────────────────────────────────────────────────
  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  post-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: post_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - post-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  comment-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: comment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - comment-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend Services ───────────────────────────────────────────────
  auth-service:
    build: ./auth-service
    ports:
      - "8001:8001"
    environment:
      AUTH_DATABASE_URL: postgresql://postgres:password@auth-db:5432/auth_db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      PYTHONPATH: /app
    depends_on:
      auth-db:
        condition: service_healthy
    restart: unless-stopped

  post-service:
    build: ./post-service
    ports:
      - "8002:8002"
    environment:
      POST_DATABASE_URL: postgresql://postgres:password@post-db:5432/post_db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      PYTHONPATH: /app
    depends_on:
      post-db:
        condition: service_healthy
    restart: unless-stopped

  comment-service:
    build: ./comment-service
    ports:
      - "8003:8003"
    environment:
      COMMENT_DATABASE_URL: postgresql://postgres:password@comment-db:5432/comment_db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      AI_BACKEND: ${AI_BACKEND:-mock}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      HF_MODEL_NAME: ${HF_MODEL_NAME:-martin-ha/toxic-comment-model}
      PYTHONPATH: /app
    depends_on:
      comment-db:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend ───────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - auth-service
      - post-service
      - comment-service
    restart: unless-stopped

volumes:
  auth-db-data:
  post-db-data:
  comment-db-data:
